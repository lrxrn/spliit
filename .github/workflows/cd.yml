name: Create and publish a Docker image

on:
  push:
    tags:
      - '*'
    branches:
      - 'claude/spliit-docker-registry-9zEkX'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (in addition to :latest)'
        required: false
        default: '1.19.1-openai'

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          # Pin the emulator: newer QEMU releases crash Node/V8 under arm64
          # emulation ("Illegal instruction"). v7.0.0 emulates aarch64 reliably.
          image: tonistiigi/binfmt:qemu-v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Downcase repo
        run: |
          echo "REPO=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

      - name: Determine image tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "IMAGE_TAG=${{ github.ref_name }}" >> "${GITHUB_ENV}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.tag }}" >> "${GITHUB_ENV}"
          else
            echo "IMAGE_TAG=1.19.1-openai" >> "${GITHUB_ENV}"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.REPO }}:latest
          provenance: false # Disable provenance to avoid unknown/unknown
          sbom: false       # Disable sbom to avoid unknown/unknown
          # Persist layers across runs so a flaky step (e.g. a transient
          # network error during the slow emulated arm64 build) doesn't throw
          # away the whole build, and subsequent builds are much faster.
          cache-from: type=gha
          cache-to: type=gha,mode=max
